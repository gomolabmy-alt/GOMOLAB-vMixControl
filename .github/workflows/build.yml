name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: mac-arm
          - platform: macos-13
            target: x86_64-apple-darwin
            label: mac-intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (macOS)
        if: runner.os == 'macOS'
        run: npx tauri build --target ${{ matrix.target }}

      - name: Build Tauri (Windows)
        if: runner.os == 'Windows'
        run: npx tauri build --target ${{ matrix.target }}

      # ── Upload macOS artifacts ─────────────────────────────────────────────
      - name: Upload .dmg
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: GOMOLAB-vMixControl-${{ matrix.label }}.dmg
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload .app (zip)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: GOMOLAB-vMixControl-${{ matrix.label }}.app
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

      # ── Upload Windows artifacts ───────────────────────────────────────────
      - name: Upload .msi
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: GOMOLAB-vMixControl-${{ matrix.label }}.msi
          path: src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload .exe (NSIS)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: GOMOLAB-vMixControl-${{ matrix.label }}-setup.exe
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  # ── Create GitHub Release on tag push ─────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
